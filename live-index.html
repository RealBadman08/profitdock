        <script>
            const profitdock_hosts = ['profitdock.site', 'www.profitdock.site'];
            const is_profitdock_host = profitdock_hosts.includes(window.location.hostname);
            const profitdock_reset_version = 'profitdock-cache-reset-2026-04-27-v2';

            if (window.location.hostname === 'profitdock.site') {
                const preferred_url = new URL(window.location.href);
                preferred_url.hostname = 'www.profitdock.site';
                window.location.replace(preferred_url.toString());
            } else if (is_profitdock_host) {
                try {
                    const current_url = new URL(window.location.href);
                    const reset_key = 'profitdock.cache-reset.version';
                    const should_force_refresh = localStorage.getItem(reset_key) !== profitdock_reset_version;

                    if (should_force_refresh) {
                        localStorage.setItem(reset_key, profitdock_reset_version);

                        if (!current_url.searchParams.has('pd_refresh')) {
                            current_url.searchParams.set('pd_refresh', Date.now().toString());
                            window.location.replace(current_url.toString());
                        }
                    } else if (current_url.searchParams.has('pd_refresh')) {
                        current_url.searchParams.delete('pd_refresh');
                        window.history.replaceState({}, '', current_url.toString());
                    }
                } catch (error) {
                    console.error('[HTML] ProfitDock cache reset bootstrap failed:', error);
                }
            }
        </script>

        <!-- Browser Service Worker Prevention -->
        <script>
            // Check browser compatibility and prevent service worker issues
            const userAgent = navigator.userAgent.toLowerCase();
            const isFirefox = userAgent.includes('firefox');
            const isSafari = userAgent.includes('safari') && !userAgent.includes('chrome');
            const isProfitDockDomain =
                window.location.hostname === 'profitdock.site' || window.location.hostname === 'www.profitdock.site';
            const shouldSkipSW = isFirefox || isSafari || isProfitDockDomain;

            if (shouldSkipSW) {
                const browserName = isProfitDockDomain ? 'ProfitDock domain' : isFirefox ? 'Firefox' : 'Safari';
                console.log(
                    `[HTML] ${browserName} detected - preventing service worker registration to avoid chunk loading issues`
                );

                // Cleanup any existing service workers
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker
                        .getRegistrations()
                        .then(registrations => {
                            registrations.forEach(registration => {
                                console.log(`[HTML] Unregistering existing SW for ${browserName}:`, registration.scope);
                                registration.unregister();
                            });
                        })
                        .catch(error => {
                            console.error('[HTML] Failed to cleanup service workers:', error);
                        });
                }

                if ('caches' in window) {
                    caches
                        .keys()
                        .then(cacheNames => Promise.all(cacheNames.map(cacheName => caches.delete(cacheName))))
                        .then(() => {
                            console.log(`[HTML] Cleared CacheStorage entries for ${browserName}`);
                        })
                        .catch(error => {
                            console.error('[HTML] Failed to clear caches:', error);
                        });
                }
            }

            // Check online/offline status
            console.log('[HTML] Online status:', navigator.onLine);
            window.addEventListener('online', () => {
                console.log('[HTML] Back online');
            });
            window.addEventListener('offline', () => {
                console.log('[HTML] Gone offline');
            });

            // Listen for service worker messages if registered by PWA utils (non-problematic browsers only)
            if ('serviceWorker' in navigator && !shouldSkipSW) {
                navigator.serviceWorker.addEventListener('message', event => {
                    console.log('[HTML] Message from service worker:', event.data);
                });
            }
        </script>
