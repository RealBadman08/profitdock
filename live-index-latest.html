        <script>
            (function () {
                const hostname = window.location.hostname;
                const is_profitdock_domain = hostname === 'profitdock.site' || hostname === 'www.profitdock.site';

                if (!is_profitdock_domain) {
                    return;
                }

                try {
                    localStorage.setItem('config.app_id', '339iXSWkH7NEGne7sMdQT');
                    localStorage.removeItem('config.socket_app_id');
                    localStorage.removeItem('config.server_url');
                } catch (error) {
                    console.error('[HTML] Unable to prime ProfitDock app configuration:', error);
                }

                if (hostname === 'www.profitdock.site') {
                    const canonical_url = new URL(window.location.href);
                    canonical_url.hostname = 'profitdock.site';
                    window.location.replace(canonical_url.toString());
                    return;
                }

                const should_force_sw_reload = sessionStorage.getItem('profitdock_sw_reset_done') !== '1';
                const cleanup_tasks = [];

                if ('serviceWorker' in navigator) {
                    cleanup_tasks.push(
                        navigator.serviceWorker.getRegistrations().then(registrations =>
                            Promise.all(registrations.map(registration => registration.unregister()))
                        )
                    );
                }

                if ('caches' in window) {
                    cleanup_tasks.push(caches.keys().then(cache_names => Promise.all(cache_names.map(name => caches.delete(name)))));
                }

                Promise.allSettled(cleanup_tasks)
                    .then(() => {
                        if (should_force_sw_reload && navigator.serviceWorker?.controller) {
                            sessionStorage.setItem('profitdock_sw_reset_done', '1');
                            window.location.replace(window.location.href);
                        }
                    })
                    .catch(error => {
                        console.error('[HTML] ProfitDock startup cache reset failed:', error);
                    });
            })();
        </script>

        <!-- Browser Service Worker Prevention -->
        <script>
            // Check browser compatibility and prevent service worker issues
            const userAgent = navigator.userAgent.toLowerCase();
            const isFirefox = userAgent.includes('firefox');
            const isSafari = userAgent.includes('safari') && !userAgent.includes('chrome');
            const isProfitDockDomain =
                window.location.hostname === 'profitdock.site' || window.location.hostname === 'www.profitdock.site';
            const shouldSkipSW = isFirefox || isSafari || isProfitDockDomain;

            if (shouldSkipSW) {
                const browserName = isProfitDockDomain ? 'ProfitDock domain' : isFirefox ? 'Firefox' : 'Safari';
                console.log(
                    `[HTML] ${browserName} detected - preventing service worker registration to avoid chunk loading issues`
                );

                // Cleanup any existing service workers
                const cleanup_tasks = [];
                if ('serviceWorker' in navigator) {
                    cleanup_tasks.push(
                        navigator.serviceWorker
                            .getRegistrations()
                            .then(registrations => {
                                registrations.forEach(registration => {
                                    console.log(
                                        `[HTML] Unregistering existing SW for ${browserName}:`,
                                        registration.scope
                                    );
                                });
                                return Promise.all(registrations.map(registration => registration.unregister()));
                            })
                            .catch(error => {
                                console.error('[HTML] Failed to cleanup service workers:', error);
                            })
                    );
                }

                if ('caches' in window) {
                    cleanup_tasks.push(
                        caches
                            .keys()
                            .then(cacheNames => Promise.all(cacheNames.map(cacheName => caches.delete(cacheName))))
                            .then(() => {
                                console.log(`[HTML] Cleared CacheStorage entries for ${browserName}`);
                            })
                            .catch(error => {
                                console.error('[HTML] Failed to clear caches:', error);
                            })
                    );
                }

                if (isProfitDockDomain && sessionStorage.getItem('profitdock_sw_reset_done') !== '1') {
                    Promise.allSettled(cleanup_tasks).then(() => {
                        if (navigator.serviceWorker?.controller) {
                            sessionStorage.setItem('profitdock_sw_reset_done', '1');
                            window.location.replace(window.location.href);
                        }
                    });
                }
            }

            // Check online/offline status
            console.log('[HTML] Online status:', navigator.onLine);
            window.addEventListener('online', () => {
                console.log('[HTML] Back online');
            });
            window.addEventListener('offline', () => {
                console.log('[HTML] Gone offline');
            });

            // Listen for service worker messages if registered by PWA utils (non-problematic browsers only)
            if ('serviceWorker' in navigator && !shouldSkipSW) {
                navigator.serviceWorker.addEventListener('message', event => {
                    console.log('[HTML] Message from service worker:', event.data);
                });
            }
        </script>
